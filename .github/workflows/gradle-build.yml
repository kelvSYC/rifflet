name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kdoc-id: ${{ steps.upload-kdoc.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Build
        run: ./gradlew --info --stacktrace :build
      - name: Upload KDoc
        id: upload-kdoc
        uses: actions/upload-artifact@v4
        with:
          name: kdoc
          path: components/rifflet-core/build/dokka/html

  publish-snapshot:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Create initial tag for semver
        run: |
          if ! git rev-parse v0.1.0 >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag v0.1.0
            git push origin v0.1.0
          fi
      - name: Delete existing snapshot versions
        run: |
          for pkg in $(gh api -H "Accept: application/vnd.github+json" "/user/packages?package_type=maven&per_page=100" --jq '.[].name'); do
            for ver_id in $(gh api -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions?per_page=100" --jq '.[] | select(.name | test("-SNAPSHOT$"; "i")) | .id'); do
              gh api -X DELETE -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions/${ver_id}" || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set snapshot version properties
        run: |
          find . -name "gradle.properties" -not -path "*/build/*" -exec sh -c 'echo "semver.stage=snapshot" >> "$1" && echo "semver.scope=patch" >> "$1" && echo "semver.checkClean=false" >> "$1"' _ {} \;
      - name: Publish Snapshot
        run: ./gradlew :publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
