name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - '**.kt'
      - '**.gradle.kts'
      - '**.gradle'
      - '**.properties'
      - '**.toml'
      - '!gradle/wrapper/**'

jobs:
  claude-review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    continue-on-error: true

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5-20251001'
          prompt: |
            Review the changes in this pull request. For each file changed, evaluate:
            - Correctness: logic errors, edge cases, incorrect assumptions
            - Kotlin Multiplatform compatibility: no JVM-only APIs in common source sets
            - API design: naming, consistency with existing conventions in the codebase
            - Test coverage: are the changes adequately tested with Kotest?
            Post inline comments on specific lines where you find issues. Summarize your findings at the end.
